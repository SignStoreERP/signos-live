<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decals & Stickers Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="signos-core.js"></script>
    <script src="logic_decal.js"></script>
    <style>input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }</style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div id="main-card" class="max-w-xl mx-auto mt-6 w-[calc(100%-2rem)] sm:w-full bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">

    <div class="p-6 space-y-4">
        
        <!-- DIMENSIONS -->
        <div class="grid grid-cols-3 gap-3">
            <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
            <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Width (in)</label><input type="number" id="w" value="12" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
            <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height (in)</label><input type="number" id="h" value="12" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
        </div>
        
        <div id="sheet-warn" class="hidden bg-yellow-50 text-yellow-700 text-[10px] font-bold px-3 py-1.5 rounded border border-yellow-200 transition-opacity">⚠️ Max Roll Width (52") reached.</div>

        <!-- DYNAMIC MATERIALS ICON GRID -->
        <div class="pt-2">
            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Print Material Category</label>
            <input type="hidden" id="material" value="Standard">
            
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                <button onclick="selectMaterial('Standard')" id="btn-mat-Standard" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="sticky-note" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">General<br>Purpose</span>
                </button>
                <button onclick="selectMaterial('Cast')" id="btn-mat-Cast" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="car" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Vehicle<br>Wrap</span>
                </button>
                <button onclick="selectMaterial('Clear')" id="btn-mat-Clear" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="square" class="w-6 h-6 mb-1 opacity-40"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Clear<br>Vinyl</span>
                </button>
                <button onclick="selectMaterial('Translucent')" id="btn-mat-Translucent" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="layers" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Translucent<br>Backlit</span>
                </button>
                <button onclick="selectMaterial('Reflective')" id="btn-mat-Reflective" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="zap" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Reflective<br>Vinyl</span>
                </button>
                <button onclick="selectMaterial('Drywall')" id="btn-mat-Drywall" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="panel-top" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Drywall<br>(Smooth)</span>
                </button>
                <button onclick="selectMaterial('Textured')" id="btn-mat-Textured" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="grid-3x3" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Textured<br>Wall</span>
                </button>
                <button onclick="selectMaterial('Perf')" id="btn-mat-Perf" class="mat-btn flex flex-col items-center justify-center p-2 border-2 rounded-lg transition-all focus:outline-none">
                    <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight">Window<br>Perf</span>
                </button>
            </div>
        </div>

        <!-- DEPENDENT LAMINATE DROPDOWN -->
        <div class="pt-2">
            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Overlaminate Setup</label>
            <select id="laminate" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none shadow-sm" onchange="runCalc()">
                <!-- Populated by JavaScript -->
            </select>
        </div>

        <!-- STATIC REFERENCE NOTICE (Same Tab Link) -->
        <div class="text-[10px] text-blue-800 bg-blue-50 p-3 rounded border border-blue-200 font-medium leading-tight flex items-center justify-between shadow-sm">
            <span class="mr-2">The print media and laminate pairings are strictly based on the <b>Print Media and Design / Work Order Description</b> handout.</span>
            <a href="docs_print_media.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-3 py-1.5 rounded shadow-sm transition shrink-0 uppercase tracking-widest text-[9px]">View Guide</a>
        </div>

        <div class="grid grid-cols-2 gap-4 pt-2">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cut Shape</label>
                <select id="shape" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                    <option value="Rectangle">Square/Rectangle</option>
                    <option value="Contour">Contour Shape</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Weeding</label>
                <select id="weeding" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                    <option value="Standard">Standard</option>
                    <option value="Complex">Complex Weeding</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4 border-t border-gray-100 pt-4 mt-2">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Apply Transfer Tape?</label>
                <select id="masking" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                    <option value="No">No (Peel & Stick)</option>
                    <option value="Yes">Yes (Pre-Masked)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="bg-blue-50 p-6 border-t border-blue-100 shadow-inner">
        <div class="flex justify-between items-end mb-2"><span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span><span id="ui-unit" class="text-2xl font-black text-blue-900 tracking-tight">$0.00</span></div>
        <div class="border-t border-blue-200/50 my-3"></div>
        <div class="space-y-1 text-xs text-blue-900/70 pt-1">
            <div class="flex justify-between"><span>Printed Decals (<span id="lbl-sqft">0</span> sqft):</span><span id="ui-print" class="font-bold">$0.00</span></div>
        </div>
        <div class="flex justify-between items-end border-t-2 border-blue-800 my-3 pt-2">
            <div><span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span><span class="text-[9px] font-bold text-blue-600 uppercase block mt-1" id="ui-min-text">Shop Minimum: $35</span><div id="min-badge" class="hidden bg-red-100 text-red-600 border border-red-200 text-[9px] font-bold px-1 rounded inline-block mt-1">MINIMUM APPLIED</div></div>
            <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
        </div>
    </div>

    <div class="bg-gray-50 p-4 border-t border-gray-200">
        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Description</label>
        <textarea id="job-desc" class="w-full text-xs p-2 border rounded bg-white h-20 text-gray-600 font-mono outline-none" readonly></textarea>
    </div>

</div>

<script>
let backendData = {};

const matLamMap = {
    "Standard": { name: "General Purpose (Arlon 4500GLX)", lams: [{val: "Arlon 3210 Gloss", text: "Arlon 3210 Premium Gloss"}] },
    "Cast": { name: "Vehicle Wrap (3M IJ180)", lams: [{val: "3M 8518 Gloss", text: "3M 8518 Gloss"}, {val: "3M 8519 Luster", text: "3M 8519 Luster"}, {val: "3M 8520 Matte", text: "3M 8520 Matte"}] },
    "Clear": { name: "Clear (Oracal 3640)", lams: [{val: "Arlon Premium", text: "Arlon Premium Laminate"}, {val: "None", text: "No Laminate"}] },
    "Translucent": { name: "Translucent (Oracal 3850)", lams: [{val: "Arlon Premium", text: "Arlon Premium Laminate"}, {val: "None", text: "No Laminate"}] },
    "Reflective": { name: "Reflective (Oralite 5400)", lams: [{val: "Arlon 3210 Gloss", text: "Arlon 3210 Premium Gloss"}] },
    "Drywall": { name: "Drywall (GF226 Smooth)", lams: [{val: "Arlon Premium", text: "Arlon Premium Laminate"}] },
    "Textured": { name: "Textured Wall (3M IJ8624)", lams: [{val: "3M 8524 Luster", text: "3M 8524 Textured Luster"}] },
    "Perf": { name: "Window Perf", lams: [{val: "Optically Clear", text: "Optically Clear Laminate"}, {val: "None", text: "No Laminate"}] }
};

function selectMaterial(matKey) {
    document.getElementById('material').value = matKey;
    document.querySelectorAll('.mat-btn').forEach(btn => {
        btn.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-700');
        btn.classList.add('border-gray-200', 'bg-white', 'text-gray-500');
    });
    const activeBtn = document.getElementById('btn-mat-' + matKey);
    if (activeBtn) {
        activeBtn.classList.remove('border-gray-200', 'bg-white', 'text-gray-500');
        activeBtn.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-700');
    }
    updateLaminates();
}

function updateLaminates() {
    const matVal = document.getElementById('material').value;
    const lamSelect = document.getElementById('laminate');
    const mapObj = matLamMap[matVal];
    lamSelect.innerHTML = '';
    mapObj.lams.forEach(l => { lamSelect.innerHTML += `<option value="${l.val}">${l.text}</option>`; });
    runCalc();
}

function enforceLimits(maxShort) {
    let wEl = document.getElementById('w'); let hEl = document.getElementById('h'); let warnEl = document.getElementById('sheet-warn');
    if (!wEl || !hEl) return;
    let w = parseFloat(wEl.value) || 0; let h = parseFloat(hEl.value) || 0;
    let didClamp = false;
    if (w > maxShort && h > maxShort) {
        if (w > h) { h = maxShort; hEl.value = h; } else { w = maxShort; wEl.value = w; }
        didClamp = true;
    }
    if (warnEl) {
        if (didClamp) { warnEl.classList.remove('hidden'); clearTimeout(warnEl.timeoutId); warnEl.timeoutId = setTimeout(() => warnEl.classList.add('hidden'), 3000); }
    }
}

function runCalc() {
    if(!backendData.Retail_Min_Order) return;
    enforceLimits(52);
    try {
        const matKey = document.getElementById('material').value;
        const matTxt = matLamMap[matKey].name;
        const lamVal = document.getElementById('laminate').value;

        const inputs = {
            qty: parseFloat(document.getElementById('qty').value) || 1, 
            w: parseFloat(document.getElementById('w').value) || 12, 
            h: parseFloat(document.getElementById('h').value) || 12,
            material: matKey, 
            shape: document.getElementById('shape').value, 
            weeding: document.getElementById('weeding').value, 
            masking: document.getElementById('masking').value,
            lam: lamVal !== 'None' 
        };

        const result = calculateDecal(inputs, backendData);
        if (!result || !result.retail) return;

        const ret = result.retail; const fmt = (n) => "$" + (n || 0).toFixed(2);
        document.getElementById('lbl-sqft').innerText = (((inputs.w * inputs.h) / 144) * inputs.qty).toFixed(1);
        document.getElementById('ui-unit').innerText = fmt(ret.unitPrice);
        document.getElementById('ui-total').innerText = fmt(ret.grandTotal);
        document.getElementById('ui-print').innerText = fmt(ret.printTotal);
        document.getElementById('ui-min-text').innerText = `Shop Minimum: $${parseFloat(backendData.Retail_Min_Order || 35)}`;
        document.getElementById('min-badge').classList.toggle('hidden', !ret.isMinApplied);

        const cutTxt = inputs.shape === 'Rectangle' ? 'Square Cut' : 'Contour Cut';
        const weedTxt = inputs.weeding === 'Complex' ? ' (Complex Weeding)' : '';
        const maskTxt = inputs.masking === 'Yes' ? 'Pre-Masked.' : 'No Transfer Tape.';
        const lamTxt = lamVal !== 'None' ? `Laminate: ${lamVal}` : 'No Laminate';
        document.getElementById('job-desc').value = `(x${inputs.qty}) ${inputs.w}" x ${inputs.h}" Custom Decals.\nMaterial: ${matTxt}\n${lamTxt}\n${cutTxt}${weedTxt}. ${maskTxt}`;
    } catch(e) { console.error(e); }
}

window.addEventListener('load', async () => {
    // Render the Lucide icons
    lucide.createIcons();
    
    if (typeof injectHeader === 'function') injectHeader("Decals & Stickers");
    selectMaterial('Standard');
    
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    try {
        const req = await fetch(`${SCRIPT_URL}?req=view_module&tab=PROD_Decals`);
        backendData = await req.json();
        if(statusText) {
            statusText.innerText = "ONLINE"; statusText.className = "font-bold text-green-500";
            if(statusDot) { statusDot.className = "w-2 h-2 rounded-full bg-green-500"; statusDot.classList.remove("animate-pulse"); }
        }
        runCalc();
    } catch(e) {
        if(statusText) { statusText.innerText = "OFFLINE"; statusText.className = "font-bold text-red-500"; }
    }
});
</script>
</body>
</html>
